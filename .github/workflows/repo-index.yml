name: Repository Index

on:
  push:
    paths:
      - 'stable/packages/**'
      - 'testing/packages/**'
      - 'unstable/packages/**'
      - '.github/workflows/repo-index.yml'
  pull_request:
    paths:
      - 'stable/packages/**'
      - 'testing/packages/**'
      - 'unstable/packages/**'
      - '.github/workflows/repo-index.yml'
  workflow_dispatch:

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate channel indices
        shell: bash
        run: |
          set -euo pipefail
          for channel in stable testing unstable; do
            mkdir -p "$channel/packages"
            pkgs_json="[]"
            shopt -s nullglob
            for file in "$channel"/packages/*.astpkg; do
              base=$(basename "$file")
              size=$(stat -c%s "$file")
              checksum=$(sha256sum "$file" | awk '{print $1}')

              stem="${base%.astpkg}"
              arch="${stem##*-}"
              rest="${stem%-*}"
              version="${rest##*-}"
              name="${rest%-*}"

              entry=$(jq -n \
                --arg name "$name" \
                --arg version "$version" \
                --arg arch "$arch" \
                --arg checksum "$checksum" \
                --arg filename "$base" \
                --argjson size "$size" \
                '{name:$name,version:$version,architecture:$arch,description:"",dependencies:[],conflicts:[],provides:[],checksum:$checksum,filename:$filename,size:$size,license:"",maintainer:""}')

              pkgs_json=$(jq -c --argjson entry "$entry" '. + [$entry]' <<< "$pkgs_json")
            done

            jq -n \
              --arg name "$channel" \
              --arg description "Altair Linux package repository" \
              --arg updated "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --argjson packages "$pkgs_json" \
              '{name:$name,description:$description,last_updated:$updated,packages:$packages}' \
              > "$channel/index.json"
            test -f "$channel/index.json"
          done

      - name: Validate index JSON
        shell: bash
        run: |
          set -euo pipefail
          for channel in stable testing unstable; do
            jq -e . "$channel/index.json" > /dev/null
          done

      - name: Upload index artifacts
        uses: actions/upload-artifact@v4
        with:
          name: channel-indexes
          path: |
            stable/index.json
            testing/index.json
            unstable/index.json
